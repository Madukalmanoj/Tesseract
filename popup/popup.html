<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>OmniExtract</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f10;--s1:#1a1a1e;--s2:#232328;--s3:#2a2a30;
  --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);
  --t:#f0eff4;--t2:#9997a8;--t3:#55536a;
  --acc:#7c6af7;--acc2:#5d9cf5;--green:#3ecf8e;--red:#f87171;--amber:#f59e0b;
  --r:10px;
}
body{width:380px;min-height:420px;background:var(--bg);color:var(--t);
  font-family:'SF Pro Text','Segoe UI',system-ui,sans-serif;font-size:13px}

/* Header */
.hdr{padding:12px 14px 10px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.logo{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:13px}
.hdr-info h1{font-size:13px;font-weight:600;letter-spacing:-.2px}
.hdr-info p{font-size:10px;color:var(--t3)}
.plat{margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.5px;padding:3px 8px;border-radius:20px;border:1px solid var(--b);color:var(--t3);text-transform:uppercase}
.plat.claude{color:#f0a070;border-color:rgba(240,160,112,.3);background:rgba(240,160,112,.07)}
.plat.chatgpt{color:var(--green);border-color:rgba(62,207,142,.3);background:rgba(62,207,142,.07)}
.plat.gemini{color:#3f8ef6;border-color:rgba(63,142,246,.3);background:rgba(63,142,246,.07)}
.plat.grok{color:#faf9f5;border-color:rgba(250,249,245,.3);background:rgba(250,249,245,.07)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--b)}
.tab{flex:1;padding:9px 0;font-size:11px;font-weight:500;color:var(--t3);background:none;border:none;cursor:pointer;letter-spacing:.2px;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{color:var(--t);border-bottom-color:var(--acc)}
.tab:hover:not(.active){color:var(--t2)}
.panel{display:none;padding:14px}
.panel.active{display:block}

/* Common */
.label{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.row{display:flex;gap:6px;margin-bottom:12px}
.tog{flex:1;padding:7px 0;border-radius:8px;background:var(--s1);border:1px solid var(--b);color:var(--t3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.tog.on{background:var(--s2);border-color:var(--acc);color:var(--t)}
.btn{width:100%;padding:10px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;letter-spacing:-.2px;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-secondary{background:var(--s1);border:1px solid var(--b);color:var(--t)}
.btn-secondary:hover{background:var(--s2)}

.status{margin-top:10px;padding:9px 12px;border-radius:8px;font-size:12px;display:none;line-height:1.5}
.status.info{background:rgba(124,106,247,.1);color:#a99cf9;border:1px solid rgba(124,106,247,.2)}
.status.ok{background:rgba(62,207,142,.1);color:var(--green);border:1px solid rgba(62,207,142,.2)}
.status.err{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.status.warn{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}

/* LLM section */
.llm-section{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:12px;margin-bottom:12px}
.llm-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.switch{position:relative;display:inline-block;width:34px;height:20px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--s3);transition:.2s;border-radius:20px;border:1px solid var(--b)}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:2px;bottom:2px;background-color:var(--t2);transition:.2s;border-radius:50%}
input:checked + .slider{background-color:var(--acc);border-color:rgba(124,106,247,0.4)}
input:checked + .slider:before{transform:translateX(14px);background-color:#fff}
.llm-section-body{display:none}
.llm-section.expanded .llm-section-body{display:block}
.provider-tabs{display:flex;gap:5px;margin-bottom:10px}
.pvt{flex:1;padding:6px;border-radius:8px;background:var(--s2);border:1px solid var(--b);color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.pvt.sel{border-color:var(--acc);color:var(--acc);background:rgba(124,106,247,.08)}
.key-row{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.key-row input{flex:1;padding:7px 10px;background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.key-row input:focus{border-color:var(--acc)}
.key-show{padding:6px 8px;background:none;border:1px solid var(--b);border-radius:6px;color:var(--t3);cursor:pointer;font-size:10px}
.key-show:hover{color:var(--t)}

/* stats row */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:12px 0}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:8px;padding:8px;text-align:center}
.stat .v{font-size:18px;font-weight:700}
.stat .k{font-size:10px;color:var(--t3);margin-top:1px}

/* action grid */
.actgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}
.abtn{padding:8px 10px;background:var(--s1);border:1px solid var(--b);color:var(--t);font-size:12px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:6px;transition:background .15s}
.abtn:hover{background:var(--s2)}
.abtn:disabled{opacity:.4;cursor:not-allowed}

/* file list */
.file-list{margin-top:10px;background:var(--s1);border:1px solid var(--b);border-radius:8px;overflow:hidden;display:none}
.file-list-hdr{padding:7px 10px;border-bottom:1px solid var(--b);font-size:11px;color:var(--t2)}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--b);font-size:11px}
.file-item.clickable:hover{background:var(--s2);cursor:pointer}
.file-item.clickable:hover .file-name{color:var(--t)}
.file-item:last-child{border-bottom:none}
.file-icon{font-size:14px;flex-shrink:0}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.file-badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600}
.file-badge.ok{background:rgba(62,207,142,.15);color:var(--green)}
.file-badge.chip{background:rgba(245,158,11,.15);color:var(--amber)}

/* image preview */
.img-preview{margin-top:10px;background:var(--s1);border:1px solid var(--b);border-radius:8px;overflow:hidden;display:none}
.img-preview-hdr{padding:7px 10px;border-bottom:1px solid var(--b);font-size:11px;color:var(--t2);display:flex;justify-content:space-between}
.img-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:7px;max-height:100px;overflow-y:auto}
.img-thumb{aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--b);cursor:pointer}
.img-thumb img{width:100%;height:100%;object-fit:cover}

/* capsule name row */
.capsule-name-row{margin-top:12px;margin-bottom:0}
.capsule-name-row input{width:100%;padding:8px 10px;background:var(--s1);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.capsule-name-row input:focus{border-color:var(--acc)}

/* capsule panel */
.cap-toolbar{display:flex;gap:6px;margin-bottom:10px}
.cap-search{flex:1;padding:7px 10px;background:var(--s1);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:12px;outline:none}
.cap-search:focus{border-color:var(--acc)}

.cap-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto}
.cap-card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:10px 12px;transition:all .15s;position:relative}
.cap-card:hover{background:var(--s2);border-color:var(--b2)}
.cap-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cap-meta{font-size:10px;color:var(--t3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.cap-actions{display:flex;gap:4px;margin-top:8px}
.cap-act{flex:1;padding:5px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--b);background:var(--s2);color:var(--t2);text-align:center;transition:all .12s}
.cap-act:hover{color:var(--t);border-color:var(--b2)}
.cap-act.drop{background:rgba(124,106,247,.12);border-color:rgba(124,106,247,.35);color:var(--acc)}
.cap-act.drop:hover{background:rgba(124,106,247,.2)}
.cap-act.del{color:var(--red);border-color:rgba(248,113,113,.2)}
.cap-pin-btn{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cap-pin-btn:hover{color:var(--amber);background:rgba(255,255,255,.05)}
.cap-pin-btn.pinned{color:var(--amber)}

.cap-empty{color:var(--t3);font-size:12px;text-align:center;padding:30px 0}

.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .5s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}

  /* Teleport Section */
  .teleport-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  .tport-btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--b);
    color: var(--t);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--s1);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tport-btn:active {
    transform: scale(0.96);
  }
  .tport-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
    border-color: var(--b) !important;
    background: var(--s1) !important;
  }
  .tport-btn.claude:hover:not(:disabled) {
    border-color: #f0a070;
    background: rgba(240, 160, 112, 0.08);
    box-shadow: 0 0 12px rgba(240, 160, 112, 0.15);
  }
  .tport-btn.chatgpt:hover:not(:disabled) {
    border-color: var(--green);
    background: rgba(62, 207, 142, 0.08);
    box-shadow: 0 0 12px rgba(62, 207, 142, 0.15);
  }
  .tport-btn.gemini:hover:not(:disabled) {
    border-color: #8ab4f8;
    background: rgba(138, 180, 248, 0.08);
    box-shadow: 0 0 12px rgba(138, 180, 248, 0.15);
  }
  .tport-btn.grok:hover:not(:disabled) {
    border-color: #fff;
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.10);
  }
  
  /* SVGs & Brand Dots */
  .icon-svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    stroke-width: 2px;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    vertical-align: middle;
    flex-shrink: 0;
    display: inline-block;
  }
  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .brand-dot.claude { background-color: #f0a070; }
  .brand-dot.chatgpt { background-color: var(--green); }
  .brand-dot.gemini { background-color: #3f8ef6; }
  .brand-dot.grok { background-color: var(--t); }
  .brand-dot.groq { background-color: var(--amber); }
  .brand-dot.anthropic { background-color: #f0a070; }
  
  /* Progress Bar */
  #extract-progress {
    display: none;
    margin-top: 12px;
    background: var(--s1);
    border: 1px solid var(--b);
    border-radius: var(--r);
    padding: 10px 12px;
  }
  #extract-progress-bar-container {
    background: var(--s2);
    height: 5px;
    border-radius: 3px;
    overflow: hidden;
  }
  #extract-progress-bar {
    background: linear-gradient(90deg, var(--acc), var(--acc2));
    width: 0%;
    height: 100%;
    transition: width 0.15s ease;
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:block"><path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 22V12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M21 7L12 12L3 7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="2" fill="currentColor" opacity="0.6"/></svg></div>
  <div class="hdr-info"><h1>OmniExtract</h1><p>Extract · Refine · Drop</p></div>
  <span class="plat" id="platBadge">—</span>
  <button id="btnSettings" title="LLM Settings" style="background:none;border:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:5px;transition:color .15s">
    <svg class="icon-svg" style="width:16px;height:16px" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
  </button>
</div>

<div class="tabs">
  <button class="tab active" data-tab="extract">
    <svg class="icon-svg" style="width:12px;height:12px;" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    Extract
  </button>
  <button class="tab" data-tab="capsules">
    <svg class="icon-svg" style="width:12px;height:12px;transform:rotate(-45deg)" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="5" ry="5"></rect><line x1="12" y1="7" x2="12" y2="17"></line></svg>
    Capsules
  </button>
</div>

<!-- ══════════════════════ EXTRACT TAB ══════════════════════ -->
<div class="panel active" id="tab-extract">

  <!-- LLM Auto-Refine section (just toggle switch) -->
  <div class="llm-section" id="llmSection" style="margin-bottom:12px; padding:12px; display:flex; justify-content:space-between; align-items:center">
    <span style="font-size:12px;font-weight:600;color:var(--t2)">Auto-refine with LLM</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="llmProviderBadge" style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600"></span>
      <label class="switch">
        <input type="checkbox" id="llmEnabled">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Capsule name -->
  <div class="capsule-name-row" style="margin-bottom:12px">
    <input type="text" id="capNameInput" placeholder="Capsule name (auto-filled)…"/>
  </div>

  <button class="btn btn-primary" id="btnExtract" style="display:flex;align-items:center;justify-content:center;gap:6px">
    <svg class="icon-svg" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
    Extract + Save Capsule
  </button>
  
  <!-- Progress Bar Container -->
  <div id="extract-progress">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
      <span id="extract-progress-status" style="font-size:11px; color:var(--t2); font-weight:500;">Preparing...</span>
      <span id="extract-progress-percent" style="font-size:11px; font-weight:bold; color:var(--acc);">0%</span>
    </div>
    <div id="extract-progress-bar-container">
      <div id="extract-progress-bar"></div>
    </div>
  </div>

  <div class="status" id="extractStatus"></div>

  <!-- Extract & Teleport Section -->
  <div class="label" style="margin-top: 16px; margin-bottom: 8px; display:flex; align-items:center; gap:6px">
    <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    Extract & Teleport To
  </div>
  <div class="teleport-grid">
    <button class="tport-btn claude" data-target="claude" title="Teleport to Claude">
      <span class="brand-dot claude"></span> Claude
    </button>
    <button class="tport-btn chatgpt" data-target="chatgpt" title="Teleport to ChatGPT">
      <span class="brand-dot chatgpt"></span> ChatGPT
    </button>
    <button class="tport-btn gemini" data-target="gemini" title="Teleport to Gemini">
      <svg class="icon-svg" style="width:12px;height:12px;color:#3f8ef6" viewBox="0 0 24 24"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9Z"></path></svg> Gemini
    </button>
    <button class="tport-btn grok" data-target="grok" title="Teleport to Grok">
      <span class="brand-dot grok"></span> Grok
    </button>
  </div>

  <div id="extractResults" style="display:none">
    <div class="stats">
      <div class="stat"><div class="v" id="sMsg">0</div><div class="k">Messages</div></div>
      <div class="stat"><div class="v" id="sImg">0</div><div class="k">Images</div></div>
      <div class="stat"><div class="v" id="sFile">0</div><div class="k">Files</div></div>
    </div>

    <!-- File list -->
    <div class="file-list" id="fileList">
      <div class="file-list-hdr" style="display:flex;align-items:center;gap:6px">
        <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        Attached Files
      </div>
      <div id="fileItems"></div>
    </div>

    <div class="actgrid" style="margin-top:10px">
      <button class="abtn" id="btnCopy">
        <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        Copy Text
      </button>
      <button class="abtn" id="btnTxt">
        <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
        Save .txt
      </button>
      <button class="abtn" id="btnJson">
        <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
        Save JSON
      </button>
      <button class="abtn" id="btnImgs" disabled>
        <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        Save Images
      </button>
    </div>

    <div class="img-preview" id="imgPreview" style="display:none">
      <div class="img-preview-hdr"><span>Images</span><span id="imgPreviewCount" style="color:var(--acc)"></span></div>
      <div class="img-grid" id="imgGrid"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════ CAPSULES TAB ══════════════════════ -->
<div class="panel" id="tab-capsules">
  <div class="cap-toolbar">
    <input class="cap-search" id="capSearch" type="text" placeholder="Search capsules…"/>
  </div>
  <div style="display:flex;justify-content:flex-end;margin:6px 0 8px">
    <button id="btnClearAll" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px">
      <svg class="icon-svg" style="width:11px;height:11px;color:var(--red)" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      Delete All
    </button>
  </div>
  <div class="cap-list" id="capList"></div>
</div>

<!-- ══════════════════════ SETTINGS TAB ══════════════════════ -->
<div class="panel" id="tab-settings">
  <div class="label" style="margin-bottom:12px">LLM Provider Configuration</div>
  
  <div class="provider-tabs" style="margin-bottom:12px">
    <button class="pvt sel" data-prov="groq" style="display:flex;align-items:center;justify-content:center;gap:6px">
      <span class="brand-dot groq"></span> Groq
    </button>
    <button class="pvt" data-prov="anthropic" style="display:flex;align-items:center;justify-content:center;gap:6px">
      <span class="brand-dot anthropic"></span> Anthropic
    </button>
    <button class="pvt" data-prov="gemini" style="display:flex;align-items:center;justify-content:center;gap:6px">
      <svg class="icon-svg" style="width:10px;height:10px;color:#3f8ef6" viewBox="0 0 24 24"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9Z"></path></svg> Gemini
    </button>
  </div>
  
  <div class="key-row" style="margin-bottom:16px">
    <input type="password" id="apiKeyInput" placeholder="Paste API key…" autocomplete="off"/>
    <button class="key-show" id="toggleKey">show</button>
  </div>
  
  <div style="margin-bottom:16px; display:flex; gap:8px; align-items:center">
    <button class="btn btn-secondary" id="btnTestKey" style="flex:1; padding:7px 10px; font-size:12px; display:flex; align-items:center; justify-content:center; gap:6px">
      <svg class="icon-svg" style="width:12px;height:12px" viewBox="0 0 24 24"><path d="M22 2L11 13"></path><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      Test Connection
    </button>
    <span id="testKeyStatus" style="font-size:11px; font-weight:600; display:none"></span>
  </div>
  
  <button class="btn btn-secondary" id="btnBackExtract">Back to Extract</button>

  <div style="margin-top:20px; padding-top:14px; border-top:1px solid var(--b);">
    <div class="label" style="margin-bottom:10px; display:flex; align-items:center; gap:6px">
      <svg class="icon-svg" style="width:12px;height:12px;color:var(--t3)" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="10" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="14" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="7" y1="16" x2="17" y2="16"/></svg>
      Keyboard Shortcuts
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; font-size:11.5px; color:var(--t2)">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>Extract Capsule:</span>
        <kbd style="background:var(--s2); border:1px solid var(--b2); border-radius:4px; padding:2px 6px; font-family:monospace; font-size:10.5px; color:var(--t)">Alt+Shift+E</kbd>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>Drop Last Pinned:</span>
        <kbd style="background:var(--s2); border:1px solid var(--b2); border-radius:4px; padding:2px 6px; font-family:monospace; font-size:10.5px; color:var(--t)">Alt+Shift+D</kbd>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>Copy Chat Text:</span>
        <kbd style="background:var(--s2); border:1px solid var(--b2); border-radius:4px; padding:2px 6px; font-family:monospace; font-size:10.5px; color:var(--t)">Alt+Shift+X</kbd>
      </div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
